name: Deploy Agent to GEAP Registry

on:
  workflow_dispatch:

permissions:
  contents: 'read'
  id-token: 'write'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Google Auth (OIDC)
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Deploy to GEAP Registry
        env:
          GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID || 'hubscape-geap' }}
          GCP_LOCATION: ${{ vars.GCP_LOCATION || 'us-central1' }}
          GCP_STAGING_BUCKET: ${{ secrets.GCP_STAGING_BUCKET || 'hubscape-geap-reasoning-engines' }}
        run: |
          REPO_DIR="$(basename "$(pwd)")"
          NORM_DIR="$(echo "$REPO_DIR" | tr '-' '_')"
          if [ -n "$GOOGLE_APPLICATION_CREDENTIALS" ]; then
            PARENT_DIR="$(cd .. && pwd)"
            cp "$GOOGLE_APPLICATION_CREDENTIALS" "$PARENT_DIR/gha-creds-temp.json"
            export GOOGLE_APPLICATION_CREDENTIALS="$PARENT_DIR/gha-creds-temp.json"
          fi
          cd ..
          if [ "$REPO_DIR" != "$NORM_DIR" ]; then
            mv "$REPO_DIR" "$NORM_DIR"
          fi
          cd "$NORM_DIR"
          echo "from app.core.agent_runtime_app import agent_runtime, AgentEngineApp" > app/agent_runtime_app.py
          export PYTHONPATH="$(pwd)"
          python deploy.py
          cd ..
          if [ "$REPO_DIR" != "$NORM_DIR" ]; then
            mv "$NORM_DIR" "$REPO_DIR"
          fi
          if [ -n "$GOOGLE_APPLICATION_CREDENTIALS" ]; then
            rm -f "$GOOGLE_APPLICATION_CREDENTIALS"
          fi
